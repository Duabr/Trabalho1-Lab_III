<script src="js/api.js" defer></script>
<script src="js/main.js" defer></script>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Bases Numéricas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>Conversor de Bases</h1>
        <p>Laboratório de Programação III - Ciência da Computação</p>

        <div class="card">
            <div class="input-group">
                <label for="numberInput">Número:</label>
                <input type="text" id="numberInput" placeholder="Ex: 1010 ou 255">
                <span id="msgErro" class="error-message hidden">Por favor, digite um número.</span>
            </div>

            <div class="input-group">
                <label for="baseOrigem">De:</label>
                <select id="baseOrigem">
                    <option value="2">Binário (2)</option>
                    <option value="10" selected>Decimal (10)</option>
                    <option value="16">Hexadecimal (16)</option>
                    <option value="8">Octal (8)</option>
                </select>
            </div>

            <div class="input-group">
                <label for="baseDestino">Para:</label>
                <select id="baseDestino">
                    <option value="2" selected>Binário (2)</option>
                    <option value="10">Decimal (10)</option>
                    <option value="16">Hexadecimal (16)</option>
                    <option value="8">Octal (8)</option>
                </select>
            </div>

            <button id="btnConverter">Converter Agora</button>
        </div>

        <div id="resultadoContainer" class="card hidden">
            <h3>Resultado:</h3>
            <p id="resultadoTexto"></p>
            <small id="statusBanco">Status: Aguardando servidor...</small>
        </div>
    </div>

    <script src="js/main.js" defer></script>
</body>
</html>
